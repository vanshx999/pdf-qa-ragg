<!DOCTYPE html>
<html>
<head>
    <title>RAG API</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        textarea, input { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #result { margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 5px; white-space: pre-wrap; }
        .source { margin: 10px 0; padding: 10px; background: #e9ecef; border-left: 3px solid #007bff; }
    </style>
</head>
<body>
    <h1>📄 RAG API — Ask Your PDF</h1>
    
    <h3>Upload PDF</h3>
    <form id="uploadForm">
        <input type="file" id="pdfFile" accept=".pdf" required>
        <button type="submit">Upload</button>
    </form>
    <div id="uploadResult"></div>
    
    <h3>Ask Question</h3>
    <form id="askForm">
        <input type="text" id="question" placeholder="What does this document say about...?" required>
        <button type="submit">Ask</button>
    </form>
    
    <div id="result"></div>

    <script>
        const API_URL = "http://localhost:8000";
        
        // Upload
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData();
            formData.append('file', document.getElementById('pdfFile').files[0]);
            
            const res = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
            const data = await res.json();
            document.getElementById('uploadResult').innerHTML = 
                `<p>✅ ${data.message} (${data.chunks_created} chunks)</p>`;
        };
        
        // Ask
        document.getElementById('askForm').onsubmit = async (e) => {
            e.preventDefault();
            const question = document.getElementById('question').value;
            
            const res = await fetch(`${API_URL}/ask`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question })
            });
            const data = await res.json();
            
            let html = `<h3>Answer:</h3><p>${data.answer}</p><h3>Sources:</h3>`;
            data.sources.forEach((s, i) => {
                html += `<div class="source"><strong>[${i+1}] Page ${s.page}</strong><br>${s.text}...</div>`;
            });
            document.getElementById('result').innerHTML = html;
        };
    </script>
</body>
</html>
